<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="EMPRAC - Empaques flexibles para pequeñas y medianas empresas hondureñas. Bolsas para café, tajaditas, frituras, semillas, condimentos y más.">
    <meta name="keywords" content="empaques Honduras, bolsas para cafe, empaques para alimentos, EMPRAC, emprendedores catrachos, bolsas flexibles">
    <meta name="author" content="EMPRAC">
    <meta property="og:title" content="EMPRAC - Empaques para tu Negocio">
    <meta property="og:description" content="Empaques flexibles para pequeñas y medianas empresas productoras de alimentos en Honduras.">
    <meta property="og:type" content="website">
    <title>Inicio - Tienda Virtual EMPRAC</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body {
            width: 100%;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #fafafa;
            color: #212121;
            overflow-x: hidden;
        }

        header {
            background: linear-gradient(180deg, #cccccc 0%, #151515 10%, #000000 50%, #151515 90%, #cccccc 100%);
            color: white;
            padding: 20px 0;
            box-shadow: 0 4px 12px rgba(10, 20, 40, 0.4);
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 20px;
        }

        .header-content {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .nav-buttons {
            display: flex;
            gap: 15px;
            width: 340px;
        }

        .nav-buttons a {
            flex: 1;
            background-color: #151515;
            color: white;
            padding: 10px 24px;
            border-radius: 6px;
            text-decoration: none;
            font-weight: 700;
            letter-spacing: 0.5px;
            transition: all 0.3s;
            border: 2px solid transparent;
            text-align: center;
            text-transform: uppercase;
            font-size: 14px;
        }

        .nav-buttons a:hover {
            background-color: #151515;
            border-color: white;
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(255, 140, 0, 0.3);
        }

        .nav-buttons a.active {
            background-color: #f15a24;
            
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(241, 90, 36, 0.3);
        }

        .nav-buttons a.active:hover {
            background-color: #151515;
            border-color: white;
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(255, 140, 0, 0.3);
        }

        h1 {
            font-size: 28px;
        }

        .logo-area {
            display: flex;
            align-items: center;
            gap: 14px;
        }

        .brand-logo {
            height: 62px;
            width: auto;
            max-width: 360px;
            border-radius: 8px;
            object-fit: contain;
            display: block;
        }

        .hero-banner-bottom-img {
            position: relative;
            width: 100vw;
            margin-left: calc(50% - 50vw);
            background: linear-gradient(180deg, #062c4f 0%, #041f38 100%);
            display: block;
            line-height: 0;
            margin-top: 0;
            overflow: hidden;
        }

        .hero-banner-bottom-img img {
            display: block;
            width: 100vw;
            max-width: none;
            height: auto;
            object-fit: contain;
            object-position: center top;
        }

        .hero-whatsapp-btn {
            position: absolute;
            left: 50%;
            bottom: 580px;
            transform: translateX(-50%);
            display: inline-flex;
            align-items: center;
            gap: 10px;
            background-color: #f15a24;
            color: #ffffff;
            text-decoration: none;
            font-weight: 700;
            font-size: 15px;
            padding: 12px 18px;
            border-radius: 10px;
            border: 2px solid rgba(255, 255, 255, 0.6);
            box-shadow: 0 6px 18px rgba(0, 0, 0, 0.28);
            z-index: 2;
            white-space: nowrap;
        }

        .hero-whatsapp-btn i {
            font-size: 22px;
        }

        .hero-whatsapp-btn:hover {
            background-color: #20BA5A;
        }

        .beneficios {
            background: linear-gradient(180deg, #cccccc 0%, #151515 10%, #000000 50%, #151515 90%, #cccccc 100%);
            padding: 12px 0;
            border-top: 1px solid #eee;
            border-bottom: 1px solid #eee;
        }

        .beneficios-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 10px;
            text-align: center;
        }

        .beneficio-item {
            padding: 6px 6px;
        }

        .beneficio-item .ico {
            font-size: 26px;
            margin-bottom: 4px;
        }

        .beneficio-item p {
            font-size: 13px;
            color: #ffffff;
            font-weight: 700;
            line-height: 1.3;
        }

        @media (max-width: 768px) {
            .header-content {
                flex-direction: column;
                gap: 15px;
                align-items: flex-start;
            }

            .nav-buttons {
                width: 100%;
                justify-content: space-between;
            }

            .nav-buttons a {
                flex: 1;
                text-align: center;
                padding: 8px 12px;
                font-size: 14px;
            }

            .brand-logo {
                height: 46px;
                width: auto;
                max-width: 72vw;
            }

            .hero-banner-bottom-img img {
                width: 100%;
                height: auto;
                object-fit: contain;
                object-position: center top;
            }

            .hero-whatsapp-btn {
                bottom: 580px;
                font-size: 13px;
                padding: 10px 14px;
            }

            .hero-whatsapp-btn i {
                font-size: 20px;
            }

            .beneficios-grid {
                grid-template-columns: repeat(2, 1fr);
            }
        }
    </style>
</head>
<body>
    <header>
        <div class="container">
            <div class="header-content">
                <h1>
                    <div class="logo-area">
                        <img src="Logo de EMPRAC.png" alt="EMPRAC" class="brand-logo">
                    </div>
                </h1>
                <nav class="nav-buttons">
                    <a href="index.html" class="active">Inicio</a>
                    <a href="productos.html">Productos</a>
                </nav>
            </div>
        </div>
    </header>

    <div class="hero-banner-bottom-img">
        <img src="Web Emprac.png" alt="Bolsas EMPRAC">
        <a class="hero-whatsapp-btn" href="https://wa.me/50492902991?text=Hola%2C%20quiero%20consultar%20disponibilidad%20de%20bolsas" target="_blank" rel="noopener noreferrer">
            <i class="fa-brands fa-whatsapp" aria-hidden="true"></i>
            Consultar ahora
        </a>
    </div>

    <section class="beneficios">
        <div class="container">
            <div class="beneficios-grid">
                <div class="beneficio-item">
                    <div class="ico">🚚</div>
                    <p>Entrega rápida<br>en Honduras</p>
                </div>
                <div class="beneficio-item">
                    <div class="ico">📦</div>
                    <p>Stock<br>disponible</p>
                </div>
                <div class="beneficio-item">
                    <div class="ico">💬</div>
                    <p>Atención directa<br>por WhatsApp</p>
                </div>
                <div class="beneficio-item">
                    <div class="ico">🏷️</div>
                    <p>Precios al<br>por mayor</p>
                </div>
            </div>
        </div>
    </section>
</body>
</html>
